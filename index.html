<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الزكاة | أ. أحمد سعيد</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .card {
            background: #fff;
            max-width: 480px; width: 100%;
            padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border-top: 6px solid var(--accent);
        }

        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 7px; font-weight: 600; font-size: 0.9rem; }

        input, select {
            width: 100%; padding: 12px;
            border: 1px solid #ddd; border-radius: 8px;
            box-sizing: border-box; font-size: 16px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .price-manual {
            background: #fffdf0; padding: 15px;
            border-radius: 10px; border: 1px dashed #d4af37;
            margin-bottom: 20px;
        }

        button {
            width: 100%; padding: 15px;
            background: var(--accent); color: white;
            border: none; border-radius: 8px;
            font-size: 1.1rem; cursor: pointer; font-weight: bold;
        }

        #result {
            margin-top: 20px; padding: 15px;
            border-radius: 8px; display: none;
            text-align: center; line-height: 1.6;
        }

        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        footer {
            margin-top: 30px; text-align: center;
            font-size: 0.95rem; color: #7f8c8d;
        }
        .author { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>حاسبة الزكاة المبسطة</h2>

    <div class="price-manual">
        <label>سعر جرام الذهب اليوم (عيار 24)</label>
        <input type="number" id="goldPriceInput" placeholder="مثال: 345" value="340">
        <small style="color: #856404; font-size: 0.75rem;">* ضروري لتحديد نصاب المال بدقة</small>
    </div>

    <div class="input-group">
        <label>نوع الوعاء الزكوي</label>
        <select id="zakatType" onchange="updateUI()">
            <option value="money">المال النقدي (ريال)</option>
            <option value="gold">الذهب (جرام)</option>
            <option value="silver">الفضة (جرام)</option>
        </select>
    </div>

    <div class="input-group">
        <label id="mainLabel">المبلغ الإجمالي (ريال)</label>
        <input type="number" id="mainValue" placeholder="أدخل القيمة هنا">
    </div>

    <div id="goldKaratGroup" class="input-group" style="display:none;">
        <label>عيار الذهب</label>
        <select id="karat">
            <option value="24">عيار 24</option>
            <option value="21">عيار 21</option>
            <option value="18">عيار 18</option>
        </select>
    </div>

    <button onclick="calculateZakat()">احسب الزكاة</button>

    <div id="result"></div>
</div>

<footer>
    إعداد: <span class="author">أ. أحمد سعيد</span> &copy; 2026
</footer>

<script>
    function updateUI() {
        const type = document.getElementById('zakatType').value;
        const goldGroup = document.getElementById('goldKaratGroup');
        const mainLabel = document.getElementById('mainLabel');
        
        goldGroup.style.display = (type === 'gold') ? 'block' : 'none';
        mainLabel.innerText = (type === 'money') ? "المبلغ الإجمالي (بالريال)" : "الوزن الإجمالي (بالجرام)";
        document.getElementById('result').style.display = 'none';
    }

    function calculateZakat() {
        const type = document.getElementById('zakatType').value;
        const amount = parseFloat(document.getElementById('mainValue').value);
        const goldPrice = parseFloat(document.getElementById('goldPriceInput').value);
        const resDiv = document.getElementById('result');
        
        if (!amount || !goldPrice) {
            alert("يرجى إدخال القيم المطلوبة");
            return;
        }

        const nisabMoney = goldPrice * 85; 
        let zakat = 0;
        let eligible = false;
        let message = "";

        resDiv.style.display = 'block';

        if (type === 'money') {
            if (amount >= nisabMoney) {
                zakat = amount * 0.025;
                eligible = true;
                message = `تجب الزكاة: <strong>${zakat.toFixed(2)} ريال</strong>`;
            } else {
                let diff = nisabMoney - amount;
                message = `لم تبلغ النصاب (${Math.round(nisabMoney)} ريال).<br>يتبقى لك <b>${Math.round(diff)} ريال</b> لتجب الزكاة.`;
            }
        } 
        else if (type === 'gold') {
            const k = parseInt(document.getElementById('karat').value);
            const pureWeight = (amount * k) / 24;
            if (pureWeight >= 85) {
                zakat = amount * 0.025;
                eligible = true;
                message = `تجب الزكاة: <strong>${zakat.toFixed(2)} جرام</strong> من عيار ${k}`;
            } else {
                message = "الوزن أقل من النصاب الشرعي (85 جرام ذهب صافي).";
            }
        } 
        else if (type === 'silver') {
            if (amount >= 595) {
                zakat = amount * 0.025;
                eligible = true;
                message = `تجب الزكاة: <strong>${zakat.toFixed(2)} جرام</strong> من الفضة`;
            } else {
                message = "الوزن أقل من النصاب الشرعي (595 جرام).";
            }
        }

        resDiv.className = eligible ? 'alert-success' : 'alert-info';
        resDiv.innerHTML = message;
    }
</script>

</body>
</html>
