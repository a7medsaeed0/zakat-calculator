<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الزكاة الإبداعية | أ. أحمد سعيد</title>
    <style>
        :root {
            --primary-color: #27ae60;
            --gold-color: #d4af37;
            --silver-color: #95a5a6;
            --bg-gradient: linear-gradient(135deg, #1e502e 0%, #2ecc71 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #2c3e50;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 450px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h2 { color: var(--primary-color); margin-bottom: 25px; font-size: 1.8rem; }

        .input-box { margin-bottom: 20px; text-align: right; }
        
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            background: #f9f9f9;
        }

        input:focus { border-color: var(--primary-color); background: #fff; }

        .btn-calc {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-calc:active { transform: scale(0.98); }

        #result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease;
            font-weight: 500;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .status-success { background: #e8f5e9; border: 2px solid #2ecc71; color: #1b5e20; }
        .status-info { background: #fff3e0; border: 2px solid #ff9800; color: #e65100; }

        .footer { margin-top: 25px; font-size: 0.9rem; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .footer b { color: #f1c40f; }

        /* تغيير الألوان بناءً على النوع */
        .gold-theme { border-top: 8px solid var(--gold-color); }
        .silver-theme { border-top: 8px solid var(--silver-color); }
        .money-theme { border-top: 8px solid var(--primary-color); }
    </style>
</head>
<body>

<div class="container money-theme" id="mainCard">
    <h2>✨ حاسبة الزكاة الشاملة</h2>
    
    <div class="input-box">
        <label>سعر الذهب (عيار 24) اليوم بالريال:</label>
        <input type="number" id="goldPrice" value="340" placeholder="مثال: 345">
    </div>

    <div class="input-box">
        <label>ماذا تريد أن تحسب؟</label>
        <select id="zakatType" onchange="changeTheme()">
            <option value="money">زكاة المال والنقود</option>
            <option value="gold">زكاة الذهب</option>
            <option value="silver">زكاة الفضة</option>
        </select>
    </div>

    <div class="input-box">
        <label id="valueLabel">المبلغ الإجمالي بالريال:</label>
        <input type="number" id="userValue" placeholder="أدخل القيمة هنا">
    </div>

    <button class="btn-calc" onclick="calculate()">احسب الآن</button>

    <div id="result-box"></div>
</div>

<div class="footer">
    تم التطوير بواسطة: <b>أ. أحمد سعيد</b> &copy; 2026
</div>

<script>
    function changeTheme() {
        const type = document.getElementById('zakatType').value;
        const card = document.getElementById('mainCard');
        const label = document.getElementById('valueLabel');
        const btn = document.querySelector('.btn-calc');

        card.className = 'container ' + type + '-theme';
        
        if(type === 'money') {
            label.innerText = "المبلغ الإجمالي بالريال:";
            btn.style.background = "#27ae60";
        } else if(type === 'gold') {
            label.innerText = "وزن الذهب بالجرام:";
            btn.style.background = "#d4af37";
        } else {
            label.innerText = "وزن الفضة بالجرام:";
            btn.style.background = "#95a5a6";
        }
        document.getElementById('result-box').style.display = 'none';
    }

    function calculate() {
        const type = document.getElementById('zakatType').value;
        const goldPrice = parseFloat(document.getElementById('goldPrice').value);
        const val = parseFloat(document.getElementById('userValue').value);
        const resBox = document.getElementById('result-box');

        if(!val || !goldPrice) { alert("لطفاً أدخل القيم المطلوبة"); return; }

        let nisab = 0;
        let zakat = val * 0.025;
        let isEligible = false;
        let unit = (type === 'money') ? 'ريال' : 'جرام';

        if(type === 'money') {
            nisab = goldPrice * 85;
            isEligible = val >= nisab;
        } else if(type === 'gold') {
            nisab = 85;
            isEligible = val >= nisab;
        } else {
            nisab = 595;
            isEligible = val >= nisab;
        }

        resBox.style.display = 'block';
        if(isEligible) {
            resBox.className = 'status-success';
            resBox.innerHTML = `✅ <b>تجب الزكاة</b><br>مقدار الزكاة المستحقة هو:<br><span style="font-size: 1.5rem;">${zakat.toLocaleString()} ${unit}</span>`;
        } else {
            resBox.className = 'status-info';
            let diff = (type === 'money') ? `<br>يتبقى لك <b>${Math.round(nisab - val)} ريال</b> لتصل للنصاب.` : "";
            resBox.innerHTML = `⚠️ <b>لم تبلغ النصاب الشرعي</b>${diff}<br>(نصابك هو ${Math.round(nisab)} ${unit})`;
        }
    }
</script>

</body>
</html>
