<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الزكاة | أ. أحمد سعيد</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #fff; max-width: 400px; width: 100%; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid #27ae60; }
        h2 { text-align: center; color: #2c3e50; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #27ae60; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: center; line-height: 1.6; }
        .info { background: #d1ecf1; color: #0c5460; }
        .success { background: #d4edda; color: #155724; }
        footer { margin-top: 20px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>حاسبة الزكاة</h2>
        <label>سعر جرام الذهب (24) اليوم:</label>
        <input type="number" id="gp" value="340">
        <select id="typ" onchange="document.getElementById('res').style.display='none'">
            <option value="m">المال النقدي (ريال)</option>
            <option value="g">الذهب (جرام)</option>
        </select>
        <input type="number" id="val" placeholder="أدخل القيمة هنا">
        <button onclick="calc()">احسب الزكاة</button>
        <div id="res"></div>
    </div>
    <footer>إعداد: أ. أحمد سعيد &copy; 2026</footer>
    <script>
        function calc(){
            const gp = parseFloat(document.getElementById('gp').value);
            const v = parseFloat(document.getElementById('val').value);
            const t = document.getElementById('typ').value;
            const res = document.getElementById('res');
            const nisab = gp * 85;
            if(!v || !gp) return;
            res.style.display = 'block';
            if(t=='m'){
                if(v >= nisab){
                    res.className = 'success';
                    res.innerHTML = `تجب الزكاة: <b>${(v*0.025).toFixed(2)} ريال</b>`;
                } else {
                    res.className = 'info';
                    res.innerHTML = `لم تبلغ النصاب (${Math.round(nisab)} ريال).<br>يتبقى لك <b>${Math.round(nisab-v)} ريال</b>.`;
                }
            } else {
                if(v >= 85){
                    res.className = 'success';
                    res.innerHTML = `تجب الزكاة: <b>${(v*0.025).toFixed(2)} جرام</b>`;
                } else {
                    res.className = 'info';
                    res.innerHTML = `أقل من النصاب الشرعي (85 جرام).`;
                }
            }
        }
    </script>
</body>
</html>
